<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Staff Login · El Amigo Tire Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --red:#C0392B; --red-dk:#8B1A1A; --cream:#FAF6F0; --char:#0E0E0E; --char-2:#1A1A1A;
    --mid:#5A4A3A; --sand:#E8DDD0; --border:#d9cfc1;
  }
  html,body{height:100%}
  body{
    font-family:'Barlow Condensed',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 10% 0%, rgba(192,57,43,0.12), transparent 60%),
      radial-gradient(900px 500px at 100% 100%, rgba(14,14,14,0.12), transparent 60%),
      var(--cream);
    color:var(--char);
    display:flex; align-items:center; justify-content:center; padding:24px;
    min-height:100vh;
  }
  .card{
    width:100%; max-width:420px;
    background:#fff; border:1px solid var(--border);
    box-shadow:0 20px 60px -20px rgba(14,14,14,0.25);
    padding:36px 32px;
  }
  .brand{
    font-family:'Oswald',sans-serif; font-weight:700; font-size:28px;
    text-transform:uppercase; letter-spacing:0.02em; text-align:center; margin-bottom:4px;
  }
  .brand span{ color:var(--red); }
  .sub{ text-align:center; font-size:13px; color:var(--mid); margin-bottom:28px; letter-spacing:0.08em; text-transform:uppercase; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--mid); margin-bottom:6px; font-weight:600; }
  .field input{
    width:100%; padding:12px 14px; font-family:inherit; font-size:15px;
    background:var(--cream); border:1px solid var(--border); color:var(--char);
    outline:none; transition:border-color .15s;
  }
  .field input:focus{ border-color:var(--red); background:#fff; }
  .row{ display:flex; justify-content:space-between; align-items:center; margin:6px 0 20px; }
  .row a{ color:var(--red); font-size:12px; text-decoration:none; letter-spacing:0.04em; }
  .row a:hover{ text-decoration:underline; }
  button.primary{
    width:100%; padding:13px 16px; font-family:'Oswald',sans-serif; font-size:15px;
    font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
    background:var(--char); color:#fff; border:none; cursor:pointer;
    transition:background .15s;
  }
  button.primary:hover{ background:var(--red); }
  button.primary:disabled{ opacity:0.5; cursor:not-allowed; }
  .err{
    margin-top:14px; padding:10px 12px; font-size:13px;
    background:#fdecea; border-left:3px solid var(--red); color:#6b1b15;
    display:none;
  }
  .err.show{ display:block; }
  .ok{
    margin-top:14px; padding:10px 12px; font-size:13px;
    background:#eaf6ec; border-left:3px solid #2a7a2a; color:#1c4a1f;
    display:none;
  }
  .ok.show{ display:block; }
  .footer-note{
    margin-top:24px; text-align:center; font-size:11px; color:#999;
    letter-spacing:0.06em; text-transform:uppercase;
  }
  .footer-note a{ color:var(--mid); text-decoration:none; }
  .footer-note a:hover{ color:var(--red); }
  .not-configured{
    text-align:center; padding:24px 16px; background:#fff7e6; border:1px solid #f0d9a8;
    margin-top:16px; font-size:13px; color:#6b4a10;
  }
  .reset-view { display:none; }
  .reset-view.show { display:block; }
  .login-view.hide { display:none; }
</style>
</head>
<body>
  <form class="card" id="login-card" onsubmit="return false;">
    <div class="brand">El <span>Amigo</span></div>
    <div class="sub">Staff portal</div>

    <div id="not-configured" class="not-configured" style="display:none;">
      Supabase backend is not configured yet. Ask NextVision to finish connecting the database before logging in.
    </div>

    <div class="login-view" id="login-view">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <div class="row">
        <span></span>
        <a href="#" id="forgot-link">Forgot password?</a>
      </div>
      <button class="primary" id="sign-in-btn" type="submit">Sign in</button>
      <div class="err" id="err"></div>
      <div class="ok"  id="ok"></div>
    </div>

    <div class="reset-view" id="reset-view">
      <p style="font-size:13px;color:var(--mid);margin-bottom:16px;">Enter your email and we'll send a password-reset link.</p>
      <div class="field">
        <label for="reset-email">Email</label>
        <input id="reset-email" type="email" required />
      </div>
      <button class="primary" id="send-reset-btn" type="button">Send reset link</button>
      <div class="row" style="margin-top:14px;">
        <a href="#" id="back-to-login">← Back to login</a>
        <span></span>
      </div>
      <div class="err" id="reset-err"></div>
      <div class="ok"  id="reset-ok"></div>
    </div>

    <div class="footer-note">
      <a href="index.html">← Back to site</a>
    </div>
  </form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/data.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const nextUrl = params.get('next') || 'admin.html';

  function show(el){ el.classList.add('show'); }
  function hide(el){ el.classList.remove('show'); }
  function setErr(el, msg){ el.textContent = msg; show(el); }

  // If Supabase isn't configured, show a friendly message instead of a broken form
  if (!window.SUPABASE_CONFIG?.enabled){
    document.getElementById('not-configured').style.display='block';
    document.getElementById('login-view').style.display='none';
  }

  // If already signed in, go to next
  (async () => {
    if (!window.SUPABASE_CONFIG?.enabled) return;
    await Auth.init();
    if (Auth.isAuthed() && Auth.role()){
      location.href = nextUrl;
    }
  })();

  document.getElementById('sign-in-btn').addEventListener('click', async () => {
    const err = document.getElementById('err'); const ok = document.getElementById('ok');
    hide(err); hide(ok);
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password){ setErr(err, 'Enter your email and password.'); return; }
    const btn = document.getElementById('sign-in-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res = await Auth.signIn(email, password);
      if (!res.role){
        setErr(err, 'Signed in, but no role assigned to this account. Contact NextVision.');
        await Auth.signOut();
        btn.disabled=false; btn.textContent='Sign in';
        return;
      }
      location.href = nextUrl;
    } catch(e){
      setErr(err, e.message || 'Login failed.');
      btn.disabled=false; btn.textContent='Sign in';
    }
  });

  document.getElementById('forgot-link').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('login-view').classList.add('hide');
    document.getElementById('reset-view').classList.add('show');
  });
  document.getElementById('back-to-login').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('reset-view').classList.remove('show');
    document.getElementById('login-view').classList.remove('hide');
  });

  document.getElementById('send-reset-btn').addEventListener('click', async () => {
    const err = document.getElementById('reset-err'); const ok = document.getElementById('reset-ok');
    hide(err); hide(ok);
    const email = document.getElementById('reset-email').value.trim();
    if (!email){ setErr(err, 'Enter your email.'); return; }
    try {
      await Auth.resetPassword(email);
      ok.textContent = 'Check your inbox for a reset link.';
      show(ok);
    } catch(e){
      setErr(err, e.message || 'Could not send reset email.');
    }
  });

  // Enter key submits login
  document.getElementById('login-card').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('reset-view').classList.contains('show')){
      e.preventDefault();
      document.getElementById('sign-in-btn').click();
    }
  });
</script>
</body>
</html>
